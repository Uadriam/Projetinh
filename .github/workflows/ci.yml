name: CI/CD Pipeline 🚀

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # ────────────────────────────────────────
  # JOB 1 — Testes (Integração Contínua)
  # ────────────────────────────────────────
  test:
    name:  Testes
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name:  Instalar dependências
        run: npm install

      - name:  Executar testes
        run: npm test

  # ────────────────────────────────────────
  # JOB 2 — Build (Empacotamento)
  # ────────────────────────────────────────
  build:
    name:  Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name:  Checkout do código
        uses: actions/checkout@v4

      - name:  Copiar src para pasta dist
        run: |
          mkdir -p dist
          cp src/index.html dist/index.html
          echo " Build gerado em dist/"

      - name:  Salvar artefato
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: dist/
          retention-days: 7

  # ────────────────────────────────────────
  # JOB 3 — Deploy (Entrega Contínua)
  # ────────────────────────────────────────
  deploy:
    name:  Deploy no GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name:  Checkout do código
        uses: actions/checkout@v4

      - name:  Configurar Pages
        uses: actions/configure-pages@v5

      - name:  Upload para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'src/'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ────────────────────────────────────────
  # JOB 4 — Notificação de resultado
  # ────────────────────────────────────────
  notificar:
    name:  Notificação
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()

    steps:
      - name:  Sucesso
        if: ${{ needs.test.result == 'success' && needs.deploy.result == 'success' }}
        run: |
          echo " Pipeline concluído com SUCESSO!"
          echo " Site publicado!"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Autor  : ${{ github.actor }}"

      - name: Falha
        if: ${{ needs.test.result == 'failure' || needs.build.result == 'failure' || needs.deploy.result == 'failure' }}
        run: |
          echo " Pipeline FALHOU!"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Verifique os logs acima para detalhes."
          exit 1
